services:
  - type: web
    name: upgrad-ai-assessment
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: demo-archetype-db
          property: connectionString

databases:
  - name: demo-archetype-db
    plan: free
